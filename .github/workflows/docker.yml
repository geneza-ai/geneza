name: docker

# Build and push the self-hostable controller and relay images to GHCR, multi-arch
# (linux/amd64 + linux/arm64). Runs on wip (the mutable `wip` tag) for early
# images; tag pushes (v*) add semver + latest. To later restrict to releases
# only, drop the `wip` push trigger.
on:
  push:
    branches: [wip]
    tags: ["v*"]

permissions:
  contents: read
  packages: write # push to ghcr.io

env:
  REGISTRY: ghcr.io
  OWNER: geneza-ai

jobs:
  image:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - {component: controller, dockerfile: deploy/docker/Dockerfile.controller}
          - {component: relay, dockerfile: deploy/docker/Dockerfile.relay}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: ver
        run: |
          if [ "${GITHUB_REF_TYPE}" = tag ]; then
            v="${GITHUB_REF_NAME#v}"
          else
            v="0.0.0-wip+$(git rev-parse --short HEAD)"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/geneza-${{ matrix.component }}
          # No per-commit `sha-<sha>` tag: it minted a new immutable image on every
          # wip push and they piled up in GHCR. The mutable `wip` tag (from
          # type=ref) covers early/testing images; releases get semver + latest.
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ steps.ver.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          push: true
          provenance: false
          # Reuse layers across runs (per component) so unchanged go.mod/deps and
          # the web build don't recompile every push.
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}
