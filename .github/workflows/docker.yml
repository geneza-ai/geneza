name: docker

# Build and push the self-hostable controller and relay images to GHCR, multi-arch
# (linux/amd64 + linux/arm64). NOT on every push — only:
#   - manual run (workflow_dispatch): a mutable `main` tag + an immutable
#     `sha-<sha>` tag, to test a specific commit;
#   - a release tag (v*): semver + `latest`.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write # push to ghcr.io

env:
  REGISTRY: ghcr.io
  OWNER: geneza-ai

jobs:
  image:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - {component: controller, dockerfile: deploy/docker/Dockerfile.controller}
          - {component: relay, dockerfile: deploy/docker/Dockerfile.relay}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: ver
        run: |
          if [ "${GITHUB_REF_TYPE}" = tag ]; then
            v="${GITHUB_REF_NAME#v}"
          else
            v="0.0.0-dev+$(git rev-parse --short HEAD)"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/geneza-${{ matrix.component }}
          # A manual run tags both a mutable branch name (`main`) and an immutable
          # `sha-<sha>` (so a specific commit is pinnable). Because builds are
          # opt-in now, sha tags no longer pile up. Release tags get semver + latest.
          tags: |
            type=ref,event=branch
            type=sha,enable=${{ github.ref_type != 'tag' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ steps.ver.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          push: true
          provenance: false
          # Reuse layers across runs (per component) so unchanged go.mod/deps and
          # the web build don't recompile every push.
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}
